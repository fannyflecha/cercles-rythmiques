                Volume2: <><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></>,
                VolumeX: <><path d="M11 5L6 9H2v6h4l5 4V5z"></path><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></>,
                Settings2: <><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></>

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}

        };

        const firebaseConfig = {
            apiKey: "AIzaSyAaEf6I-5iiYDuw-s_tJJ-35PEoejRr4P8",
            authDomain: "cercles-rythmiques.firebaseapp.com",
            projectId: "cercles-rythmiques",
            storageBucket: "cercles-rythmiques.firebasestorage.app",
            messagingSenderId: "29649922619",
            appId: "1:29649922619:web:599ee14f924095c2038a1e"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const DB_COLLECTION = "rhythms_catalogue";

        // --- PALETTE DE COULEURS "PASTEL + CONTOUR" ---
        const SOUND_LIBRARY = {
            'berimbau-dong': { name: 'Berimbau Dong (Grave)', color: '#d97706' }, 
            'berimbau-ding': { name: 'Berimbau Ding (Aigu)', color: '#fb923c' },  
            'berimbau-tchi': { name: 'Berimbau Tchi (Grésillé)', color: '#fde68a' }, 
            'pandeiro-grave': { name: 'Pandeiro Grave', color: '#dc2626' }, 
            'pandeiro-slap': { name: 'Pandeiro Slap', color: '#f87171' }, 
            'pandeiro-jingle': { name: 'Pandeiro Cymbales', color: '#fecaca' }, 
            'quinto-blem': { name: 'Quinto Blem (Étouffé)', color: '#16a34a' }, 
            'quinto-open': { name: 'Quinto Ton (Ouvert)', color: '#4ade80' }, 
            'quinto-slap': { name: 'Quinto Slap (Claqué)', color: '#bbf7d0' }, 
            'conga-blem': { name: 'Conga Blem (Étouffé)', color: '#2563eb' }, 
            'conga-open': { name: 'Conga Ton (Ouvert)', color: '#60a5fa' }, 
            'conga-slap': { name: 'Conga Slap (Claqué)', color: '#bfdbfe' }, 
            'agogo-low': { name: 'Agogo Grave', color: '#9333ea' }, 
            'agogo-high': { name: 'Agogo Aigu', color: '#c084fc' }, 
            'cowbell': { name: 'Cowbell', color: '#71717a' }, 
            'tambourine': { name: 'Tambourin', color: '#fef08a' }, 
            'shaker': { name: 'Shaker', color: '#d4d4d8' }, 
            'kick': { name: 'Kick Electro', color: '#52525b' }, 
            'snare': { name: 'Snare Electro', color: '#a1a1aa' }, 
            'hihat': { name: 'Hi-Hat', color: '#e4e4e7' } 
        };

        const AudioEngine = {
            ctx: null, masterGain: null,
            init: () => {
                if (!AudioEngine.ctx) {
                    AudioEngine.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    AudioEngine.masterGain = AudioEngine.ctx.createGain();
                    AudioEngine.masterGain.connect(AudioEngine.ctx.destination);
                }
                if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume();
            },
            createNoiseBuffer: () => {
                if (!AudioEngine.ctx) return null;
                const bufferSize = AudioEngine.ctx.sampleRate * 2.0;
                const buffer = AudioEngine.ctx.createBuffer(1, bufferSize, AudioEngine.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                return buffer;
            },
            playTone: (type, time, vol = 1, isAccent = false) => {
                if (!AudioEngine.ctx) return;
                const ctx = AudioEngine.ctx;
                const now = time || ctx.currentTime;
                const finalVol = isAccent ? vol * 1.6 : vol * 0.8;
                
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(finalVol, now);
                gainNode.connect(AudioEngine.masterGain);

                const createOsc = (waveType, freq, start, duration, v=1) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = waveType; osc.frequency.setValueAtTime(freq, start);
                    gain.gain.setValueAtTime(v, start); gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                    osc.connect(gain); gain.connect(gainNode);
                    osc.start(start); osc.stop(start + duration);
                };
                
                const createNoise = (filterType, filterFreq, duration, v=1) => {
                    const node = ctx.createBufferSource(); node.buffer = AudioEngine.createNoiseBuffer();
                    const gain = ctx.createGain(); const filter = ctx.createBiquadFilter();
                    filter.type = filterType; filter.frequency.value = filterFreq;
                    node.connect(filter); filter.connect(gain); gain.connect(gainNode);
                    gain.gain.setValueAtTime(v, now); gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    node.start(now); node.stop(now + duration);
                };

                switch (type) {
                    case 'berimbau-dong': 
                        createOsc('triangle', 90, now, 0.6, 0.8); 
                        createNoise('bandpass', 600, 0.1, 0.2); 
                        break;
                    case 'berimbau-ding': 
                        createOsc('triangle', 115, now, 0.5, 0.8); 
                        createNoise('bandpass', 800, 0.1, 0.2); 
                        break;
                    case 'berimbau-tchi': 
                        createOsc('triangle', 115, now, 0.05, 0.3); 
                        createNoise('highpass', 4000, 0.15, 0.6); 
                        break;
                    case 'pandeiro-grave': createOsc('sine', 90, now, 0.4, 0.8); break;
                    case 'pandeiro-slap': createOsc('square', 400, now, 0.05, 0.3); createNoise('highpass', 3000, 0.08, 0.5); break;
                    case 'pandeiro-jingle': createNoise('highpass', 3000, 0.15, 0.4); createOsc('square', 6000, now, 0.05, 0.1); break;
                    case 'quinto-slap': createOsc('sine', 750, now, 0.04, 0.7); createOsc('triangle', 1200, now, 0.03, 0.4); createNoise('bandpass', 4500, 0.05, 0.8); break;
                    case 'conga-slap': createOsc('sine', 550, now, 0.05, 0.7); createOsc('triangle', 900, now, 0.03, 0.4); createNoise('bandpass', 3500, 0.06, 0.8); break;
                    case 'quinto-open': createOsc('sine', 260, now, 0.35, 0.7); createOsc('sine', 520, now, 0.08, 0.15); break;
                    case 'quinto-blem': createOsc('sine', 280, now, 0.08, 0.7); break;
                    case 'conga-open': createOsc('sine', 220, now, 0.4, 0.6); break;
                    case 'conga-blem': createOsc('sine', 220, now, 0.1, 0.6); break;
                    case 'agogo-low': createOsc('triangle', 440, now, 0.4, 0.5); break;
                    case 'agogo-high': createOsc('triangle', 587, now, 0.4, 0.5); break;
                    case 'tambourine': 
                        createNoise('highpass', 5000, 0.15, 0.5);
                        createOsc('square', 7500, now, 0.05, 0.1);
                        createOsc('square', 6500, now, 0.05, 0.1);
                        break;
                    case 'cowbell':
                        const oscCow = ctx.createOscillator(); oscCow.type = 'sawtooth'; oscCow.frequency.setValueAtTime(560, now);
                        const gainCow = ctx.createGain(); gainCow.gain.setValueAtTime(0.4, now); gainCow.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        const filterCow = ctx.createBiquadFilter(); filterCow.type = 'bandpass'; filterCow.frequency.value = 800;
                        oscCow.connect(filterCow); filterCow.connect(gainCow); gainCow.connect(gainNode);
                        oscCow.start(now); oscCow.stop(now + 0.3);
                        break;
                    case 'shaker': createNoise('bandpass', 4000, 0.08, 0.2); break;
                    case 'kick':
                        const oscK = ctx.createOscillator(); const gainK = ctx.createGain();
                        oscK.frequency.setValueAtTime(150, now); oscK.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
                        gainK.gain.setValueAtTime(1, now); gainK.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                        oscK.connect(gainK); gainK.connect(gainNode); oscK.start(now); oscK.stop(now + 0.5);
                        break;
                    case 'snare': createOsc('triangle', 180, now, 0.2, 0.5); createNoise('highpass', 1000, 0.2, 0.5); break;
                    case 'hihat': createNoise('highpass', 5000, 0.05, 0.3); break;
                    default: createOsc('sine', 440, now, 0.1, 0.5);
                }
            }
        };

        const renderMiniCircle = (item) => {
            const size = 110; const center = size / 2;
            const rTracks = item.tracks || []; const nTracks = rTracks.length;
            const tSteps = item.totalSteps || 16;
            const maxR = size/2 - 8; const minR = size/4;
            const spacing = nTracks > 1 ? (maxR - minR) / (nTracks - 1) : 0;
            return (
                <div className="w-full flex justify-center">
                    <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-[110px] h-auto bg-white rounded-full border border-slate-300 shadow-inner">
                        <line x1={center} y1={10} x2={center} y2={size-10} className="stroke-slate-400" strokeWidth="2" />
                        <line x1={10} y1={center} x2={size-10} y2={center} className="stroke-slate-400" strokeWidth="2" />
                        {rTracks.map((track, idx) => {
                            const radius = maxR - (idx * spacing);
                            const color = SOUND_LIBRARY[track.id]?.color || '#94a3b8';
                            const stepsObj = Array.isArray(track.steps) ? track.steps.reduce((acc, s) => ({...acc, [s]: 1}), {}) : (track.steps || {});
                            return (
                                <g key={idx}>
                                    <circle cx={center} cy={center} r={radius} className="stroke-slate-300 fill-none" strokeWidth="1.5" />
                                    {Object.entries(stepsObj).map(([step, val], i) => val > 0 && (
                                        <circle key={i} cx={center + radius * Math.cos((step/tSteps)*2*Math.PI - Math.PI/2)} cy={center + radius * Math.sin((step/tSteps)*2*Math.PI - Math.PI/2)} r="3.5" fill={color} stroke="#0f172a" strokeWidth="0.75" />
                                    ))}
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list'); 
            const [catalog, setCatalog] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedFamily, setSelectedFamily] = useState('');
            const [selectedOrigin, setSelectedOrigin] = useState('');
            const [sortBy, setSortBy] = useState('latest');
            
            const [isPlaying, setIsPlaying] = useState(false);
            const [bpm, setBpm] = useState(100);
            const [swing, setSwing] = useState(0); 
            const [steps, setSteps] = useState(16);
            const [currentStep, setCurrentStep] = useState(-1);
            const [tracks, setTracks] = useState([]);
            
            const [currentRhythm, setCurrentRhythm] = useState(null);
            const [formData, setFormData] = useState({ title: '', family: '', origin: '', instruments: '', note: '' });
            const [isSaving, setIsSaving] = useState(false);
            const [isDeleting, setIsDeleting] = useState(false);
            const [toast, setToast] = useState("");
            const [showConfirmDelete, setShowConfirmDelete] = useState(null);
            const [previewId, setPreviewId] = useState(null);
            const [selectedRhythms, setSelectedRhythms] = useState([]);
            const [isSelectionMode, setIsSelectionMode] = useState(false);

            const nextNoteTimeRef = useRef(0);
            const currentStepRef = useRef(0);
            const timerIDRef = useRef(null);

            const clearAllNotes = useCallback(() => {
                setTracks(prev => prev.map(t => ({ ...t, steps: {} })));
                setIsPlaying(false);
            }, []);

            useEffect(() => {
                const initAuth = async () => { try { await auth.signInAnonymously(); } catch (e) {} };
                initAuth();
                
                const unsubscribe = db.collection(DB_COLLECTION).onSnapshot((snapshot) => {
                    const items = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                    setCatalog(items);
                }, (error) => {
                    console.error("Firestore Listen Error:", error);
                });

                return () => {
                    unsubscribe();
                };
            }, []);

            const uniqueFamilies = useMemo(() => [...new Set(catalog.map(r => r.family).filter(Boolean))].sort(), [catalog]);
            const uniqueOrigins = useMemo(() => [...new Set(catalog.map(r => r.origin).filter(Boolean))].sort(), [catalog]);

            const displayCatalog = useMemo(() => {
                let result = catalog.filter(r => 
                    ((r.title || "").toLowerCase().includes(searchTerm.toLowerCase()) || (r.note || "").toLowerCase().includes(searchTerm.toLowerCase())) &&
                    (!selectedFamily || r.family === selectedFamily) &&
                    (!selectedOrigin || r.origin === selectedOrigin)
                );
                if (sortBy === 'alpha') result.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
                else if (sortBy === 'family') result.sort((a, b) => (a.family || "zzz").localeCompare(b.family || "zzz"));
                else result.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                return result;
            }, [catalog, searchTerm, selectedFamily, selectedOrigin, sortBy]);

            const allDisplayedSelected = displayCatalog.length > 0 && displayCatalog.every(r => selectedRhythms.includes(r.id));
            
            const toggleSelectAll = () => {
                if (allDisplayedSelected) {
                    const displayedIds = displayCatalog.map(r => r.id);
                    setSelectedRhythms(prev => prev.filter(id => !displayedIds.includes(id)));
                } else {
                    const displayedIds = displayCatalog.map(r => r.id);
                    setSelectedRhythms(prev => [...new Set([...prev, ...displayedIds])]);
                }
            };

            const legendSounds = useMemo(() => {
                if (view !== 'print') return [];
                const usedIds = new Set();
                catalog.filter(r => selectedRhythms.includes(r.id)).forEach(r => {
                    (r.tracks || []).forEach(t => usedIds.add(t.id));
                });
                return Object.entries(SOUND_LIBRARY).filter(([id, _]) => usedIds.has(id));
            }, [view, catalog, selectedRhythms]);

            const nextNote = useCallback(() => {
                const stepTime = (60.0 / bpm * 4) / steps;
                let delay = 0;
                if (currentStepRef.current % 2 === 0) delay = (swing / 100) * (stepTime * 0.5);
                nextNoteTimeRef.current += stepTime;
                currentStepRef.current = (currentStepRef.current + 1) % steps;
                return delay;
            }, [bpm, steps, swing]);

            const scheduleNote = useCallback((stepNumber, time) => {
                setTimeout(() => setCurrentStep(stepNumber), (time - AudioEngine.ctx.currentTime) * 1000);
                tracks.forEach(track => { 
                    const hit = track.steps?.[stepNumber] || (Array.isArray(track.steps) && track.steps.includes(stepNumber) ? 1 : 0);
                    if (hit > 0 && !track.muted) AudioEngine.playTone(track.id, time, track.volume || 1, hit === 2); 
                });
            }, [tracks]);

            const scheduler = useCallback(() => {
                if (!AudioEngine.ctx) return;
                while (nextNoteTimeRef.current < AudioEngine.ctx.currentTime + 0.1) {
                    const stepTime = (60.0 / bpm * 4) / steps;
                    let swingDelay = 0;
                    if (currentStepRef.current % 2 !== 0) {
                        swingDelay = (swing / 100) * (stepTime * 0.5);
                    }
                    scheduleNote(currentStepRef.current, nextNoteTimeRef.current + swingDelay);
                    nextNote();
                }
                timerIDRef.current = window.setTimeout(scheduler, 25);
            }, [bpm, steps, swing, scheduleNote, nextNote]);

            useEffect(() => {
                if (isPlaying) {
                    AudioEngine.init();
                    nextNoteTimeRef.current = AudioEngine.ctx.currentTime + 0.05;
                    scheduler();
                } else { window.clearTimeout(timerIDRef.current); setCurrentStep(-1); }
                return () => window.clearTimeout(timerIDRef.current);
            }, [isPlaying, scheduler]);

            const stopAudio = () => { setIsPlaying(false); setCurrentStep(-1); window.clearTimeout(timerIDRef.current); };
            const goToList = () => { stopAudio(); setView('list'); setPreviewId(null); };
            
            const triggerPrint = () => {
                window.focus();
                setTimeout(() => {
                    try {
                        window.print();
                    } catch (e) {
                        console.warn("L'impression est bloquée :", e);
                    }
                }, 100);
                setToast("🖨️ Astuce : Si l'impression ne se lance pas, utilisez Ctrl+P (PC) ou Cmd+P (Mac).");
                setTimeout(() => setToast(""), 6000);
            };

            const handleCardClick = (item) => {
                if (isSelectionMode) {
                    if (selectedRhythms.includes(item.id)) setSelectedRhythms(selectedRhythms.filter(id => id !== item.id));
                    else setSelectedRhythms([...selectedRhythms, item.id]);
                } else {
                    stopAudio(); setCurrentRhythm(item); setBpm(item.bpm || 100); setSteps(item.totalSteps || 16); setSwing(item.swing || 0);
                    setTracks(item.tracks.map(t => ({
                        id: t.id, 
                        steps: Array.isArray(t.steps) ? t.steps.reduce((acc, s) => ({...acc, [s]: 1}), {}) : (t.steps || {}),
                        volume: t.volume || 1, muted: !!t.muted 
                    })));
                    setView('detail'); setPreviewId(null);
                }
            };

            const goToForm = (item = null, isCopy = false) => {
                stopAudio();
                if (item) {
                    setFormData({ 
                        id: isCopy ? null : item.id, 
                        title: item.title + (isCopy ? " (Copie)" : ""), 
                        family: item.family || '', 
                        origin: item.origin || '', 
                        instruments: item.instruments || '', 
                        note: item.note || '' 
                    });
                    setBpm(item.bpm || 100); setSteps(item.totalSteps || 16); setSwing(item.swing || 0);
                    setTracks(item.tracks.map(t => ({
                        id: t.id, 
                        steps: Array.isArray(t.steps) ? t.steps.reduce((acc, s) => ({...acc, [s]: 1}), {}) : (t.steps || {}),
                        volume: t.volume || 1, muted: !!t.muted 
                    })));
                } else {
                    setFormData({ title: '', family: '', origin: '', instruments: '', note: '' });
                    setBpm(100); setSteps(16); setSwing(0);
                    setTracks([{ id: 'berimbau-dong', steps: {0: 1, 8: 1}, volume: 1, muted: false }]);
                }
                setView('form'); setPreviewId(null);
            };

            const togglePreview = (item, e) => {
                e.stopPropagation();
                if (isSelectionMode) return;
                AudioEngine.init(); 
                if (previewId === item.id && isPlaying) { stopAudio(); setPreviewId(null); } 
                else {
                    stopAudio(); 
                    setCurrentRhythm(item); setBpm(item.bpm || 100); setSteps(item.totalSteps || 16); setSwing(item.swing || 0);
                    setTracks(item.tracks.map(t => ({ id: t.id, steps: Array.isArray(t.steps) ? t.steps.reduce((acc, s) => ({...acc, [s]: 1}), {}) : (t.steps || {}), volume: 1, muted: false })));
                    setPreviewId(item.id); 
                    setTimeout(() => setIsPlaying(true), 50); 
                }
            };

            const toggleStep = (tIdx, sIdx) => setTracks(prev => {
                const nt = [...prev]; const target = { ...nt[tIdx] }; const currentVal = target.steps[sIdx] || 0;
                const newVal = (currentVal + 1) % 3;
                target.steps = { ...target.steps, [sIdx]: newVal };
                if (newVal > 0 && !isPlaying) AudioEngine.playTone(target.id, 0, 1, newVal === 2);
                nt[tIdx] = target; return nt;
            });

            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.title.trim()) return;
                setIsSaving(true);
                try {
                    const { id, ...dataToSave } = formData;
                    const data = { 
                        ...dataToSave, 
                        tracks: tracks.map(t => ({ id: t.id, steps: t.steps, volume: t.volume || 1, muted: !!t.muted })), 
                        bpm, swing, totalSteps: steps, 
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
                    };
                    if (id) await db.collection(DB_COLLECTION).doc(id).update(data);
                    else { data.createdAt = firebase.firestore.FieldValue.serverTimestamp(); await db.collection(DB_COLLECTION).add(data); }
                    setToast("✅ Sauvegardé avec succès !"); setTimeout(() => setToast(""), 2000); goToList();
                } catch (err) { setToast("❌ Erreur de sauvegarde"); } finally { setIsSaving(false); }
            };

            const confirmDelete = async () => {
                const idToDelete = showConfirmDelete;
                if (!idToDelete) return;
                setIsDeleting(true); 
                try {
                    await db.collection(DB_COLLECTION).doc(idToDelete).delete();
                    setToast("✅ Rythme supprimé !");
                    setShowConfirmDelete(null); 
                    if(currentRhythm && currentRhythm.id === idToDelete) setCurrentRhythm(null);
                    if(previewId === idToDelete) { setPreviewId(null); stopAudio(); }
                    setView('list'); 
                    setTimeout(() => setToast(""), 3000);
                } catch (err) {
                    console.error("Firestore Delete Error:", err);
                    setToast("❌ Erreur : Suppression bloquée");
                    setShowConfirmDelete(null);
                } finally { setIsDeleting(false); }
            };

            const renderCircle = (renderTracks, renderSteps, size = 340, isEditable = false, isInteractive = true) => {
                const center = size / 2; const nTracks = renderTracks.length;
                const maxRadius = size/2 - 35; const minRadius = size/4; 
                const spacing = nTracks > 1 ? (maxRadius - minRadius) / (nTracks - 1) : 0;
                
                return (
                    <div className={`relative flex justify-center items-center w-full mx-auto ${isInteractive ? 'my-6' : 'my-2'}`} style={{ maxWidth: size + 'px' }}>
                        <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-auto touch-none select-none drop-shadow-xl overflow-visible">
                            <circle cx={center} cy={center} r={maxRadius + 20} className="fill-white stroke-slate-200" strokeWidth="1" />
                            
                            <line x1={center} y1={10} x2={center} y2={size-10} className="stroke-slate-500" strokeWidth="3.5" strokeLinecap="round" />
                            <line x1={10} y1={center} x2={size-10} y2={center} className="stroke-slate-500" strokeWidth="3.5" strokeLinecap="round" />
                            
                            {renderTracks.map((_, idx) => {
                                const radius = maxRadius - (idx * spacing);
                                return <circle key={idx} cx={center} cy={center} r={radius} className="stroke-slate-400" strokeWidth="2.5" fill="none" />;
                            })}
                            
                            <circle cx={center} cy={center} r={8} className="fill-slate-800" />

                            {renderTracks.map((track, idx) => {
                                const radius = maxRadius - (idx * spacing);
                                const color = SOUND_LIBRARY[track.id]?.color || '#94a3b8';
                                const stepsObj = Array.isArray(track.steps) ? track.steps.reduce((acc, s) => ({...acc, [s]: 1}), {}) : (track.steps || {});
                                
                                return (
                                    <g key={idx}>
                                        {Array.from({length: renderSteps}).map((_, i) => {
                                            const angle = (i / renderSteps) * 2 * Math.PI - Math.PI / 2;
                                            const x = center + radius * Math.cos(angle); const y = center + radius * Math.sin(angle);
                                            const val = stepsObj[i] || 0; 
                                            const current = isInteractive && currentStep === i;
                                            const isQuarter = i % (renderSteps/4) === 0;

                                            return (
                                                <g key={i} onClick={() => isEditable && toggleStep(idx, i)} className={isEditable ? "cursor-pointer" : ""}>
                                                    {isEditable && <circle cx={x} cy={y} r={18} className="fill-transparent" />}
                                                    {val === 0 && (
                                                        <circle cx={x} cy={y} r={isQuarter ? 6.5 : 5} fill="#f1f5f9" stroke="#94a3b8" strokeWidth="2.5" />
                                                    )}
                                                    <circle cx={x} cy={y} 
                                                        r={val === 2 ? 13 : val === 1 ? 10 : 0} 
                                                        fill={color} 
                                                        className={isInteractive ? "transition-all" : ""}
                                                        style={{ 
                                                            stroke: current ? '#ffffff' : '#0f172a', 
                                                            strokeWidth: current ? 3 : 2, 
                                                            opacity: val > 0 || current ? 1 : 0,
                                                            filter: val > 0 ? 'drop-shadow(0px 2px 3px rgba(0,0,0,0.4))' : 'none'
                                                        }}
                                                    />
                                                </g>
                                            );
                                        })}
                                    </g>
                                );
                            })}
                            {isInteractive && isPlaying && <line x1={center} y1={center} x2={center + (maxRadius + 20) * Math.cos((currentStep / renderSteps) * 2 * Math.PI - Math.PI / 2)} y2={center + (maxRadius + 20) * Math.sin((currentStep / renderSteps) * 2 * Math.PI - Math.PI / 2)} className="stroke-blue-600" strokeWidth="4" strokeLinecap="round" />}
                        </svg>
                        {isInteractive && (
                            <button onClick={(e) => { e.preventDefault(); AudioEngine.init(); setIsPlaying(!isPlaying); }} className={`absolute z-10 w-16 h-16 rounded-full flex items-center justify-center shadow-xl transition-all border-4 border-white ${isPlaying ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                                {isPlaying ? <Icon name="Pause" size={28} /> : <Icon name="Play" size={28} className="ml-1" />}
                            </button>
                        )}
                    </div>
                );
            };

            const changeTrackVol = (idx, v) => setTracks(prev => { const nt = [...prev]; nt[idx] = { ...nt[idx], volume: parseFloat(v) }; return nt; });
            const toggleMute = (idx) => setTracks(prev => { const nt = [...prev]; nt[idx] = { ...nt[idx], muted: !nt[idx].muted }; return nt; });

                <div className="animate-in pb-10">

                                        {isDeleting ? <Icon name="RefreshCw" className="animate-spin" size={16}/> : "Supprimer"}

                                </div>
                            </div>

                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => { setIsSelectionMode(!isSelectionMode); setSelectedRhythms([]); stopAudio(); }} className={`px-3 sm:px-4 py-2.5 rounded-2xl font-bold text-[10px] sm:text-[11px] uppercase transition-all flex items-center gap-2 ${isSelectionMode ? 'bg-slate-800 text-white shadow-inner border border-slate-700' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                                            <Icon name="Printer" size={16}/> 
                                            <span className="hidden sm:inline">{isSelectionMode ? 'Annuler' : 'Livret PDF'}</span>
                                            <span className="sm:hidden">{isSelectionMode ? 'Annuler' : 'PDF'}</span>
                                        </button>
                                        <button onClick={() => goToForm()} className="bg-white text-blue-700 px-4 sm:px-6 py-2.5 rounded-2xl font-bold text-[10px] sm:text-[11px] uppercase shadow-lg active:scale-95 transition-all flex items-center gap-2">
                                            <Icon name="Plus" size={16}/> Créer
                                        </button>
                                    </div>
                                </header>
                                
                                {isSelectionMode && (
                                    <div className="bg-slate-900 border-b border-slate-700 shadow-xl relative z-0">
                                        <div className="max-w-6xl mx-auto px-4 md:px-10 py-3 flex justify-between items-center gap-2">
                                            <div className="flex items-center gap-3">
                                                <button onClick={toggleSelectAll} className={`flex items-center gap-1.5 text-[10px] sm:text-xs font-bold px-3 sm:px-4 py-2 rounded-full transition-colors whitespace-nowrap ${allDisplayedSelected ? 'bg-slate-700 text-white' : 'bg-white/10 text-white/90 hover:text-white hover:bg-white/20'}`}>
                                                    <Icon name="Check" size={14} className={allDisplayedSelected ? "text-blue-400" : "opacity-50"} />
                                                    <span className="hidden sm:inline">{allDisplayedSelected ? 'Tout décocher' : 'Tout cocher'}</span>
                                                    <span className="sm:hidden">{allDisplayedSelected ? 'Aucun' : 'Tous'}</span>
                                                </button>
                                                
                                                <span className="text-white font-bold px-1 text-[10px] sm:text-xs whitespace-nowrap truncate">{selectedRhythms.length} sélec.</span>
                                            </div>
                                            
                                            <button onClick={() => { stopAudio(); setView('print'); }} disabled={selectedRhythms.length === 0} className="bg-blue-600 text-white px-4 sm:px-6 py-2 sm:py-2.5 rounded-full font-bold text-[10px] sm:text-xs uppercase disabled:opacity-50 hover:bg-blue-500 transition-colors flex items-center gap-2 shrink-0">
                                                <Icon name="Printer" size={14}/> <span className="hidden sm:inline">Générer le PDF</span><span className="sm:hidden">Générer</span>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            <main className="max-w-6xl mx-auto p-4 md:p-10 space-y-8 text-left no-print">
                                <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col xl:flex-row gap-4 items-center text-left">
                                    <div className="w-full xl:flex-1 relative text-left"><div className="absolute left-5 top-1/2 -translate-y-1/2 text-blue-500"><Icon name="Search" size={20} /></div><input type="text" placeholder="Rechercher..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-14 pr-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500/20 font-medium transition-all" /></div>
                                    <div className="grid grid-cols-2 md:flex gap-3 sm:gap-4 w-full md:w-auto text-left">
                                        <select value={selectedFamily} onChange={e => setSelectedFamily(e.target.value)} className="pl-3 pr-8 sm:pl-4 sm:pr-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl bg-slate-50 font-bold text-slate-700 text-[10px] sm:text-[11px] uppercase tracking-widest outline-none border border-slate-100 truncate"><option value="">Familles</option>{uniqueFamilies.map(t => <option key={t} value={t}>{t}</option>)}</select>
                                        <select value={selectedOrigin} onChange={e => setSelectedOrigin(e.target.value)} className="pl-3 pr-8 sm:pl-4 sm:pr-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl bg-slate-50 font-bold text-slate-700 text-[10px] sm:text-[11px] uppercase tracking-widest outline-none border border-slate-100 truncate"><option value="">Origines</option>{uniqueOrigins.map(o => <option key={o} value={o}>{o}</option>)}</select>
                                        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="col-span-2 md:col-span-1 pl-3 pr-8 sm:pl-4 sm:pr-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl bg-slate-50 font-bold text-blue-600 text-[10px] sm:text-[11px] uppercase tracking-widest outline-none border border-slate-200 truncate">
                                            <option value="latest">Récents</option>
                                            <option value="alpha">A - Z</option>
                                            <option value="family">Famille</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 text-left">
                                    {displayCatalog.map(r => {
                                        const isThisPreviewPlaying = previewId === r.id && isPlaying;
                                        return (
                                            <div key={r.id} onClick={() => handleCardClick(r)} className={`bg-white p-6 rounded-[2.5rem] shadow-sm border-2 transition-all cursor-pointer flex flex-col h-full card-hover animate-in relative group overflow-hidden ${isSelectionMode && selectedRhythms.includes(r.id) ? 'border-blue-500 bg-blue-50/50 scale-[0.98]' : 'border-transparent hover:border-blue-300'}`}>
                                                <div className="flex justify-between items-start mb-6">
                                                    <span className="bg-white text-slate-600 shadow-sm border border-slate-200 px-3 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest text-left">{r.family || 'Général'}</span>
                                                    {isSelectionMode ? (
                                                        <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors ${selectedRhythms.includes(r.id) ? 'bg-blue-600 border-blue-600 text-white' : 'bg-slate-100 border-slate-300 text-transparent'}`}><Icon name="Check" size={16}/></div>
                                                    ) : (
                                                        <button onClick={(e) => togglePreview(r, e)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${isThisPreviewPlaying ? 'bg-blue-600 text-white scale-110 shadow-lg' : 'bg-slate-100 text-blue-600 hover:bg-blue-600 hover:text-white'}`}>
                                                            <Icon name={isThisPreviewPlaying ? "Pause" : "Play"} size={18} className={!isThisPreviewPlaying ? "ml-0.5" : ""} />
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="flex justify-center mb-6 bg-slate-50/50 rounded-full p-4 border border-slate-100">{renderMiniCircle(r)}</div>
                                                <div className="text-center mt-auto text-left text-center"><h3 className="text-2xl font-display font-bold text-slate-800 uppercase veneer-title tracking-tight leading-none text-center">{r.title}</h3>{r.origin && <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2 text-center">{r.origin}</p>}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </main>
                        </div>
                    )}

                    {view === 'detail' && currentRhythm && (
                        <div className="min-h-screen pb-12 animate-in no-print text-center text-left">
                            <div className="max-w-5xl mx-auto md:mt-10 bg-white md:rounded-[3rem] shadow-2xl border border-slate-200 overflow-hidden text-center text-left">
                                <div className="p-6 md:p-12 bg-slate-50 border-b border-slate-200 relative text-center text-left text-center">
                                    <button onClick={goToList} className="absolute top-4 sm:top-6 left-4 sm:left-6 p-2.5 sm:p-3 bg-white border border-slate-200 rounded-full shadow-sm text-slate-600 hover:scale-105 transition-transform text-left"><Icon name="ArrowLeft" size={20}/></button>
                                    <div className="flex justify-center gap-2 mb-4 mt-6 text-left text-center">
                                        {currentRhythm.family && <span className="bg-blue-100 text-blue-800 px-3 py-1.5 rounded-full text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-left">{currentRhythm.family}</span>}
                                        {currentRhythm.origin && <span className="bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-full text-[9px] sm:text-[10px] font-bold uppercase tracking-widest text-left">{currentRhythm.origin}</span>}
                                    </div>
                                    <h2 className="text-4xl md:text-7xl font-display font-bold text-slate-900 uppercase tracking-tight mb-2 veneer-title leading-none text-left text-center px-4">{currentRhythm.title}</h2>
                                    <div className="flex justify-center sm:absolute sm:top-6 sm:right-6 gap-2 mt-6 sm:mt-0 text-left">
                                        <button onClick={() => goToForm(currentRhythm, true)} className="p-3 bg-white border border-slate-200 text-slate-600 rounded-xl shadow-sm hover:bg-slate-100 transition-colors text-left" title="Copier"><Icon name="Copy" size={16}/></button>
                                        <button onClick={() => goToForm(currentRhythm)} className="p-3 bg-white border border-slate-200 text-blue-600 rounded-xl shadow-sm hover:bg-blue-50 transition-colors text-left" title="Modifier"><Icon name="Edit3" size={16}/></button>
                                        <button onClick={() => setShowConfirmDelete(currentRhythm.id)} className="p-3 bg-white border border-slate-200 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl shadow-sm transition-colors text-left" title="Supprimer"><Icon name="Trash2" size={16}/></button>
                                    </div>
                                </div>
                                <div className="p-4 md:p-12 flex flex-col items-center bg-white text-left">
                                    <div className="w-full max-w-2xl mx-auto flex flex-col items-center bg-slate-50 p-4 sm:p-8 rounded-[2.5rem] shadow-inner border border-slate-100 mb-8 text-left text-left">
                                        {renderCircle(tracks, steps, 360, false, true)}
                                        <div className="flex flex-col sm:flex-row gap-4 mt-6 w-full text-left text-left">
                                            <div className="flex-1 bg-white px-5 py-4 rounded-2xl border border-slate-200 shadow-sm text-left">
                                                <div className="flex justify-between text-[10px] sm:text-[11px] font-black uppercase text-slate-500 mb-3 text-left"><span>Tempo</span><span className="text-blue-600">{bpm} BPM</span></div>
                                                <input type="range" min="40" max="200" value={bpm} onChange={e => setBpm(Number(e.target.value))} className="w-full text-left" />
                                            </div>
                                            <div className="flex-1 bg-white px-5 py-4 rounded-2xl border border-slate-200 shadow-sm text-left">
                                                <div className="flex justify-between text-[10px] sm:text-[11px] font-black uppercase text-slate-500 mb-3 text-left"><span>Swing</span><span className="text-orange-500">{swing}%</span></div>
                                                <input type="range" min="0" max="100" value={swing} onChange={e => setSwing(Number(e.target.value))} className="w-full text-left" style={{accentColor: '#f97316'}} />
                                            </div>
                                        </div>
                                    </div>

                                        {currentRhythm.instruments && (<section className="bg-slate-50 p-6 sm:p-8 rounded-[2rem] border border-slate-200 text-left text-left"><h4 className="text-[10px] sm:text-[11px] font-black text-slate-500 mb-4 uppercase tracking-[0.3em] flex items-center gap-2 text-left text-left"><Icon name="Disc" size={16}/> Instruments</h4><p className="font-bold text-slate-800 leading-relaxed text-sm text-left text-left">{currentRhythm.instruments}</p></section>)}
                                        {currentRhythm.note && (<section className="bg-blue-50 p-6 sm:p-8 rounded-[2rem] border border-blue-100 md:col-span-2 text-left text-left"><h4 className="text-[10px] sm:text-[11px] font-black text-blue-600 mb-4 uppercase tracking-[0.3em] flex items-center gap-2 text-left text-left"><Icon name="Info" size={16}/> Pédagogie</h4><p className="font-medium text-slate-700 leading-relaxed whitespace-pre-wrap text-sm text-left text-left">{currentRhythm.note}</p></section>)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'form' && (
                        <div className="min-h-screen pb-12 bg-slate-100 animate-in no-print text-left text-left">
                            <div className="max-w-5xl mx-auto bg-white md:mt-10 md:rounded-[3rem] shadow-2xl overflow-hidden text-left text-left">
                                <div className="bg-slate-50 p-6 md:p-10 border-b border-slate-200 flex justify-between items-center sticky top-0 z-20 text-left text-left">
                                    <h2 className="text-2xl sm:text-3xl font-display font-bold text-slate-800 uppercase veneer-title leading-none truncate pr-4 text-left text-left">{formData.id ? 'Éditer' : 'Nouveau'}</h2>
                                    <div className="flex items-center gap-2 sm:gap-3 shrink-0 text-left text-left text-left"><button type="button" onClick={clearAllNotes} className="px-3 sm:px-4 py-2 sm:py-2.5 bg-white border border-slate-200 rounded-xl text-[10px] sm:text-xs font-bold text-slate-500 hover:text-red-500 uppercase tracking-widest shadow-sm transition-colors flex items-center gap-2 text-left"><Icon name="Trash2" size={16} /> <span className="hidden sm:inline">Vider le cercle</span><span className="sm:hidden">Vider</span></button><button type="button" onClick={goToList} className="text-slate-400 hover:text-slate-800 p-2 transition-colors bg-white rounded-full shadow-sm border border-slate-200 text-left"><Icon name="ArrowLeft" size={20} /></button></div>
                                </div>
                                <form onSubmit={handleSave} className="p-4 sm:p-6 md:p-12 space-y-8 sm:space-y-12 text-left text-left text-left">
                                    <div className="space-y-6 text-left text-left text-left text-left">
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest text-left text-left text-left">Nom du rythme *</label><input required type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full p-4 sm:p-5 bg-slate-50 rounded-[1.5rem] font-display font-bold text-2xl sm:text-3xl outline-none focus:ring-4 focus:ring-blue-500/20 border border-slate-200 uppercase veneer-title text-left" placeholder="EX: IJEXÁ..." /></div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 text-left text-left text-left text-left">
                                            <div><label className="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest text-left text-left text-left text-left text-left">Famille</label><input type="text" list="family-suggestions" value={formData.family} onChange={e => setFormData({...formData, family: e.target.value})} className="w-full p-4 bg-slate-50 rounded-[1rem] font-bold text-xs sm:text-sm uppercase border border-slate-200 outline-none focus:bg-white text-left text-left" /><datalist id="family-suggestions">{uniqueFamilies.map(t => <option key={t} value={t} />)}</datalist></div>
                                            <div><label className="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest text-left text-left text-left text-left text-left">Origine</label><input type="text" list="origin-suggestions" value={formData.origin} onChange={e => setFormData({...formData, origin: e.target.value})} className="w-full p-4 bg-slate-50 rounded-[1rem] font-bold text-xs sm:text-sm uppercase border border-slate-200 outline-none focus:bg-white text-left text-left" /><datalist id="origin-suggestions">{uniqueOrigins.map(o => <option key={o} value={o} />)}</datalist></div>
                                        </div>
                                    </div>
                                    <div className="pt-8 border-t border-slate-200 text-left text-left text-left text-left">
                                        <h3 className="text-lg sm:text-xl font-display font-bold text-slate-800 uppercase mb-6 veneer-title flex items-center gap-2 text-left text-left text-left"><Icon name="Settings2" size={20}/> Studio Interactif</h3>
                                        <div className="grid lg:grid-cols-12 gap-8 text-left text-left text-left">
                                            <div className="lg:col-span-7 bg-slate-50 rounded-[2rem] sm:rounded-[2.5rem] p-4 sm:p-6 border border-slate-200 flex flex-col items-center shadow-inner overflow-hidden w-full text-left text-left text-left">{renderCircle(tracks, steps, 360, true, true)}<div className="w-full grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4 mt-6 text-left text-left text-left text-left"><div className="bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center text-left text-left text-left text-left"><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 sm:mb-3 text-center text-left text-left text-left">Tempo</span><span className="text-[10px] font-bold text-blue-600 mb-1 text-left text-left">{bpm}</span><input type="range" min="40" max="200" value={bpm} onChange={(e) => setBpm(Number(e.target.value))} className="w-full text-left text-left text-left"/></div><div className="bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center text-left text-left text-left text-left"><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 sm:mb-3 text-center text-orange-500 text-left text-left text-left">Swing</span><span className="text-[10px] font-bold text-orange-500 mb-1 text-left text-left">{swing}%</span><input type="range" min="0" max="100" value={swing} onChange={(e) => setSwing(Number(e.target.value))} className="w-full text-left text-left text-left" style={{accentColor: '#f97316'}}/></div><div className="col-span-2 sm:col-span-1 bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center text-left text-left text-left text-left"><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 sm:mb-3 text-center text-left text-left text-left">Divisions</span><div className="flex gap-1 bg-slate-100 p-1 rounded-lg text-left text-left text-left">{[8, 12, 16, 24].map(s => (<button type="button" key={s} onClick={() => {setIsPlaying(false); setSteps(s); clearAllNotes();}} className={`px-2 py-1 rounded text-[10px] sm:text-[11px] font-bold ${steps===s ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{s}</button>))}</div></div></div></div>
                                            <div className="lg:col-span-5 space-y-3 text-left text-left text-left text-left text-left text-left text-left"><div className="bg-blue-50 text-blue-700 text-[10px] sm:text-xs p-3 sm:p-4 rounded-xl border border-blue-100 font-medium mb-4 sm:mb-6 leading-relaxed text-left text-left text-left text-left">💡 <strong>Astuce :</strong> Cliquez plusieurs fois sur un point pour marquer un <strong>accent fort</strong>.</div>{tracks.map((track, idx) => (<div key={idx} className="flex items-center gap-2 sm:gap-3 bg-white p-2 sm:p-2.5 rounded-xl sm:rounded-2xl shadow-sm border border-slate-200 text-left text-left text-left text-left"><div className="w-3 h-3 sm:w-4 sm:h-4 rounded-full shadow-inner ml-2 shrink-0" style={{backgroundColor: SOUND_LIBRARY[track.id]?.color}}></div><select value={track.id} onChange={(e) => { const nt = [...tracks]; nt[idx].id = e.target.value; setTracks(nt); AudioEngine.playTone(e.target.value); }} className="flex-1 bg-transparent text-[11px] sm:text-[13px] font-bold py-2 outline-none cursor-pointer border-none text-slate-700 w-full min-w-0 text-left text-left text-left">{Object.entries(SOUND_LIBRARY).map(([key, lib]) => (<option key={key} value={key}>{lib.name}</option>))}</select><button type="button" onClick={() => { const nt = [...tracks]; nt.splice(idx,1); setTracks(nt); }} className="p-2 text-slate-300 hover:text-red-500 transition-colors bg-slate-50 rounded-lg sm:rounded-xl shrink-0 text-left text-left text-left" title="Supprimer piste"><Icon name="Trash2" size={16}/></button></div>))}{tracks.length < 8 && (<button type="button" onClick={() => setTracks([...tracks, { id: 'shaker', steps: {}, volume: 1, muted: false }])} className="w-full py-3 sm:py-4 border-2 border-dashed border-slate-300 rounded-xl sm:rounded-2xl text-[10px] sm:text-xs font-bold text-slate-500 uppercase tracking-widest hover:bg-slate-50 hover:border-blue-400 hover:text-blue-600 flex justify-center items-center gap-2 mt-4 text-left text-left text-left text-left text-left"><Icon name="Plus" size={14}/> Ajouter instrument</button>)}</div>
                                        </div>
                                    </div>
                                    <div className="space-y-6 pt-8 border-t border-slate-200 text-left text-left text-left text-left text-left text-left">
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest text-left text-left text-left text-left text-left">Instruments recommandés</label><input type="text" value={formData.instruments} onChange={e => setFormData({...formData, instruments: e.target.value})} className="w-full p-4 sm:p-5 bg-slate-50 rounded-[1rem] sm:rounded-[1.5rem] font-medium text-xs sm:text-sm border border-slate-200 outline-none focus:bg-white focus:ring-2 focus:ring-blue-100 text-left text-left text-left text-left" /></div>
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest text-left text-left text-left text-left text-left">Commentaires / Pédagogie</label><textarea rows={4} value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} className="w-full p-4 sm:p-5 bg-slate-50 rounded-[1rem] sm:rounded-[1.5rem] font-medium text-xs sm:text-sm border border-slate-200 outline-none resize-none focus:bg-white focus:ring-2 focus:ring-blue-100 text-left text-left text-left text-left" /></div>
                                    </div>
                                    <div className="pt-6 flex flex-col sm:flex-row gap-4 text-left text-left text-left text-left text-left text-left">
                                        {formData.id && (
                                            <button type="button" onClick={() => setShowConfirmDelete(formData.id)} className="w-full sm:w-auto px-8 py-6 bg-red-50 text-red-600 rounded-[2rem] font-bold text-xs uppercase tracking-widest hover:bg-red-100 transition-colors flex justify-center items-center gap-2 text-left text-left">
                                                <Icon name="Trash2" size={18}/> Supprimer
                                            </button>
                                        )}
                                        <button type="submit" disabled={isSaving || !formData.title} className="flex-1 brand-gradient text-white py-4 sm:py-6 rounded-[1.5rem] sm:rounded-[2rem] font-black shadow-xl uppercase text-[13px] sm:text-[15px] tracking-[0.2em] active:scale-[0.98] flex justify-center items-center gap-3 disabled:opacity-50 text-left text-left text-left">{isSaving ? <Icon name="RefreshCw" size={20} className="animate-spin" /> : <Icon name="Save" size={20}/>} Sauvegarder</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {view === 'print' && (
                        <div className="bg-white min-h-screen text-slate-900 font-sans p-4 sm:p-8 md:p-16">
                            <div className="no-print flex flex-col items-center gap-4 mb-8 sm:mb-12">
                                <div className="flex flex-col sm:flex-row gap-4 justify-center w-full">
                                    <button onClick={() => setView('list')} className="px-6 py-3 border-2 border-slate-200 rounded-xl font-bold text-xs hover:bg-slate-50 transition-colors uppercase tracking-widest text-slate-600">Fermer / Annuler</button>
                                    <button onClick={triggerPrint} className="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg hover:bg-blue-700 flex justify-center items-center gap-2"><Icon name="Printer" size={16}/> Imprimer ou Enregistrer en PDF</button>
                                </div>
                                <p className="text-[10px] text-slate-400 font-medium hidden sm:block">💡 L'aperçu bloque l'impression ? Utilisez le raccourci clavier <strong className="text-slate-600">Ctrl + P</strong> (ou Cmd + P sur Mac).</p>
                            </div>
                            
                            <div className="flex flex-col items-center justify-center min-h-[80vh] page-break text-center">
                                <h1 className="text-6xl sm:text-8xl font-display font-bold uppercase tracking-tight veneer-title mb-6">Carnet de<br/>Rythmes</h1>
                                <p className="text-xl sm:text-2xl font-bold text-slate-500 tracking-[0.3em] uppercase">Flecha Villefranche</p>
                            </div>
                            
                            <div className="space-y-0">
                                {catalog.filter(r => selectedRhythms.includes(r.id)).map(r => {
                                    const printTracks = (r.tracks || []).map(t => ({ id: t.id, steps: t.steps }));
                                    const usedIds = new Set(printTracks.map(t => t.id));
                                    const localLegend = Object.entries(SOUND_LIBRARY).filter(([id]) => usedIds.has(id));

                                    return (
                                        <div key={r.id} className="page-break flex flex-col py-8 avoid-break">
                                            <div className="text-center mb-6">
                                                <h3 className="text-3xl sm:text-4xl font-display font-bold uppercase mb-3 veneer-title text-slate-900">{r.title}</h3>
                                                <div className="flex justify-center items-center gap-2 sm:gap-3 text-[9px] sm:text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex-wrap">
                                                    {r.family && <span className="bg-slate-100 px-3 py-1 rounded">{r.family}</span>}
                                                    {r.origin && <span>• {r.origin}</span>}
                                                </div>
                                            </div>
                                            
                                            <div className="mb-6 flex justify-center flex-wrap gap-x-6 gap-y-4 px-4 bg-slate-50 rounded-2xl py-4 border border-slate-200">
                                                {localLegend.map(([key, lib]) => (
                                                    <div key={key} className="flex items-center gap-2">
                                                        <div className="w-4 h-4 rounded-full border border-slate-300 shadow-sm shrink-0" style={{backgroundColor: lib.color}}></div>
                                                        <span className="text-[10px] font-bold uppercase text-slate-700">{lib.name}</span>
                                                    </div>
                                                ))}
                                                <div className="flex items-center gap-2 border-l border-slate-300 pl-6 ml-2">
                                                    <div className="w-3 h-3 rounded-full bg-slate-400"></div>
                                                    <span className="text-[10px] font-medium text-slate-500">Normale</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="w-4 h-4 rounded-full bg-slate-400 ring-2 ring-slate-800"></div>
                                                    <span className="text-[10px] font-medium text-slate-500">Accent</span>
                                                </div>
                                            </div>
                                            
                                            <div className="flex justify-center mb-6 items-center">
                                                {renderCircle(printTracks, r.totalSteps || 16, 380, false, false)}
                                            </div>
                                            
                                            {(r.instruments || r.note) && (
                                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200 text-sm">
                                                    {r.instruments && <p className="mb-4"><strong><span className="uppercase text-[10px] tracking-widest text-slate-500 block mb-1">Instruments :</span></strong> {r.instruments}</p>}
                                                    {r.note && <p><strong><span className="uppercase text-[10px] tracking-widest text-slate-500 block mb-1">Notes / Pédagogie :</span></strong> <span className="whitespace-pre-wrap leading-relaxed">{r.note}</span></p>}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
