<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet de chants Senzala Villefranche</title>
    
    <!-- Polices & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase (Version Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #FFFDF9; color: #1f2937; }
        .font-title { font-weight: 800; text-transform: uppercase; letter-spacing: -0.025em; }
        .senzala-gradient { background: linear-gradient(135deg, #FCB13D 0%, #F7784A 100%); }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            @page { margin: 1.5cm; }
        }
        .print-only { display: none; }

        .loader { 
            border: 4px solid #f3f3f3;
            border-top: 4px solid #F7784A;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURATION ---
        const firebaseConfig = {
  apiKey: "AIzaSyCwCyoInQ06ctRzBtFLSUs9ZW1BamlyANs",
  authDomain: "chanson-capoeira.firebaseapp.com",
  projectId: "chanson-capoeira",
  storageBucket: "chanson-capoeira.firebasestorage.app",
  messagingSenderId: "127515903773",
  appId: "1:127515903773:web:54886cc97ee9bd2688c3f4",
  measurementId: "G-ECWPTRG9SV"
};

        const GEMINI_API_KEY = "AIzaSyAUqrUkzKsbT7N766ArmZf-hyi_JkEhQrc";

        // Init Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const SONG_TYPES = ["Corrido", "Ladainha", "Chula / Louvação", "Quadra", "Maculelê", "Puxada de Rede", "Samba de Roda", "Autre"];

        // Composant Icone
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [songs, setSongs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [view, setView] = useState('list');
            const [currentSong, setCurrentSong] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedRhythm, setSelectedRhythm] = useState('');
            const [isSelectionMode, setIsSelectionMode] = useState(false);
            const [selectedSongs, setSelectedSongs] = useState([]);
            
            const [formData, setFormData] = useState({ title: '', lyrics: '', translation: '', rhythm: '', note: '', youtubeLink: '', songType: '', audioData: '' });
            const [aiLoading, setAiLoading] = useState(false);
            const [aiStatus, setAiStatus] = useState('');
            const [isRecording, setIsRecording] = useState(false);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);

            // 1. Auth & Data Sync
            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (u) => {
                    if (!u) {
                        try { await auth.signInAnonymously(); } 
                        catch (e) { setError("Erreur Auth : Vérifiez que 'Anonyme' est activé dans Firebase."); setLoading(false); }
                    } else {
                        setUser(u);
                        // Start sync only after user is set
                        const unsubscribeData = db.collection('songs').onSnapshot(
                            (snap) => {
                                const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                data.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
                                setSongs(data);
                                setLoading(false);
                                setError(null);
                            },
                            (err) => { 
                                setError("Erreur Firestore : Vérifiez vos Rules (allow read, write: if true)."); 
                                setLoading(false);
                            }
                        );
                        return () => unsubscribeData();
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            // Handle Save
            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.title.trim()) return;
                try {
                    const data = { ...formData, updatedAt: new Date().toISOString() };
                    if (formData.id) {
                        await db.collection('songs').doc(formData.id).set(data, { merge: true });
                    } else {
                        await db.collection('songs').add({ ...data, createdAt: new Date().toISOString() });
                    }
                    setView('list');
                } catch (err) { alert("Erreur d'écriture."); }
            };

            // Handle AI
            const handleGenerateAI = async () => {
                if (!formData.title.trim()) return;
                setAiLoading(true); setAiStatus('Recherche...');
                const prompt = `Expert Senzala. Identifie ce chant : "${formData.title}". Renvoie UNIQUEMENT un JSON: title, lyrics, translation(FR), songType, rhythm, note, youtubeLink.`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const result = await res.json();
                    const json = JSON.parse(result.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
                    setFormData(prev => ({ ...prev, ...json }));
                    setAiStatus('Trouvé !');
                    setTimeout(() => setAiStatus(''), 2000);
                } catch (e) { setAiStatus('Erreur.'); } finally { setAiLoading(false); }
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mr = new MediaRecorder(stream);
                    mediaRecorderRef.current = mr; audioChunksRef.current = [];
                    mr.ondataavailable = (e) => audioChunksRef.current.push(e.data);
                    mr.onstop = () => {
                        const reader = new FileReader();
                        reader.readAsDataURL(new Blob(audioChunksRef.current, { type: 'audio/webm' }));
                        reader.onloadend = () => setFormData(prev => ({ ...prev, audioData: reader.result }));
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mr.start(); setIsRecording(true);
                } catch (err) { alert("Micro refusé."); }
            };

            const filteredSongs = useMemo(() => {
                return songs.filter(s => {
                    const txt = (s.title + (s.lyrics || '')).toLowerCase();
                    const matchesSearch = txt.includes(searchTerm.toLowerCase());
                    const matchesRhythm = !selectedRhythm || s.songType === selectedRhythm || s.rhythm === selectedRhythm;
                    return matchesSearch && matchesRhythm;
                });
            }, [songs, searchTerm, selectedRhythm]);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-[#FFFDF9]">
                    <div className="loader mb-6"></div>
                    <h1 className="text-xl font-black text-[#9F512A] uppercase tracking-widest">Ouverture de la Roda...</h1>
                    <p className="text-sm text-neutral-400 mt-2">Vérification des accès Senzala</p>
                    <button onClick={() => setLoading(false)} className="mt-10 text-xs text-neutral-300 underline">Forcer l'entrée (Debug)</button>
                </div>
            );

            if (view === 'print') return (
                <div className="bg-white text-black p-8 animate-in">
                    <div className="no-print mb-10 flex gap-4 justify-center">
                        <button onClick={() => setView('list')} className="px-6 py-2 border rounded-xl font-bold">Retour</button>
                        <button onClick={() => window.print()} className="px-6 py-2 bg-[#F7784A] text-white rounded-xl font-bold">Imprimer PDF</button>
                    </div>
                    <div className="max-w-4xl mx-auto text-center border-b-8 border-[#FCB13D] pb-8 mb-12">
                        <h1 className="text-5xl font-title text-[#F7784A]">Carnet de Chants</h1>
                        <h2 className="text-2xl font-bold text-[#FCB13D]">Senzala Villefranche</h2>
                    </div>
                    {songs.filter(s => selectedSongs.includes(s.id)).map(s => (
                        <div key={s.id} className="mb-16 break-inside-avoid border-l-4 border-neutral-100 pl-8">
                            <h3 className="text-3xl font-bold mb-2">{s.title}</h3>
                            <p className="text-sm font-bold text-[#F7784A] mb-6 uppercase">{s.songType} • {s.rhythm}</p>
                            <div className="flex flex-col md:flex-row gap-10">
                                <div className="flex-1 text-sm leading-relaxed whitespace-pre-wrap">{s.lyrics}</div>
                                <div className="flex-1 text-sm leading-relaxed italic text-gray-400">{s.translation}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="min-h-screen pb-10">
                    <header className="senzala-gradient text-white shadow-lg sticky top-0 z-50 p-4">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setView('list'); setIsSelectionMode(false)}}>
                                <Icon name="music" className="w-8 h-8" />
                                <h1 className="text-xl font-title leading-tight">Senzala<br/><span className="text-[10px] tracking-widest opacity-80">Villefranche</span></h1>
                            </div>
                            <div className="flex gap-2">
                                {view === 'list' && (
                                    <>
                                        <button onClick={() => setIsSelectionMode(!isSelectionMode)} className={`px-4 py-2 rounded-xl font-bold text-xs ${isSelectionMode ? 'bg-black/20' : 'bg-white/10'}`}>
                                            {isSelectionMode ? 'Terminer' : 'Livret'}
                                        </button>
                                        <button onClick={() => { setFormData({title:'', lyrics:'', translation:'', rhythm:'', note:'', youtubeLink:'', songType:'', audioData:''}); setView('form'); }} className="bg-white text-[#F7784A] px-4 py-2 rounded-xl font-black text-xs shadow-md">NOUVEAU</button>
                                    </>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-8 animate-in">
                        {error && (
                            <div className="mb-6 bg-red-50 border-2 border-red-100 p-6 rounded-[2rem] text-red-700 text-center">
                                <Icon name="alert-circle" className="mx-auto mb-2" />
                                <p className="font-bold text-sm">{error}</p>
                            </div>
                        )}

                        {view === 'list' && (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row gap-4 bg-white p-4 rounded-[2rem] shadow-sm">
                                    <div className="relative flex-1">
                                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-300" />
                                        <input type="text" placeholder="Titre, paroles..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3 rounded-2xl bg-neutral-50 border-none outline-none font-semibold focus:ring-2 focus:ring-[#FCB13D]" />
                                    </div>
                                    <select value={selectedRhythm} onChange={(e) => setSelectedRhythm(e.target.value)} className="md:w-1/3 p-3 rounded-2xl bg-neutral-50 border-none font-bold outline-none cursor-pointer">
                                        <option value="">Tous les styles</option>
                                        {SONG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>

                                {isSelectionMode && (
                                    <div className="bg-[#FCB13D]/10 border-2 border-[#FCB13D] rounded-3xl p-6 flex justify-between items-center">
                                        <span className="font-black text-[#9F512A]">{selectedSongs.length} chants sélectionnés</span>
                                        <button onClick={() => setView('print')} disabled={selectedSongs.length === 0} className="bg-[#F7784A] text-white px-8 py-3 rounded-2xl font-black disabled:bg-neutral-200 shadow-xl">CRÉER PDF</button>
                                    </div>
                                )}

                                <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                                    {filteredSongs.map(s => (
                                        <div key={s.id} onClick={() => isSelectionMode ? (selectedSongs.includes(s.id) ? setSelectedSongs(selectedSongs.filter(id => id !== s.id)) : setSelectedSongs([...selectedSongs, s.id])) : (setCurrentSong(s) || setView('detail'))} 
                                             className={`bg-white p-8 rounded-[2rem] shadow-sm border-2 transition-all cursor-pointer relative ${isSelectionMode && selectedSongs.includes(s.id) ? 'border-[#FCB13D] bg-orange-50/40 ring-4 ring-[#FCB13D]/10 scale-[0.98]' : 'border-transparent hover:border-[#FCB13D]/50'}`}>
                                            {isSelectionMode && (
                                                <div className={`absolute top-5 right-5 w-8 h-8 rounded-full border-2 flex items-center justify-center ${selectedSongs.includes(s.id) ? 'bg-[#FCB13D] border-[#FCB13D]' : 'bg-white border-neutral-200'}`}>
                                                    {selectedSongs.includes(s.id) && <Icon name="check" className="text-white w-4 h-4"/>}
                                                </div>
                                            )}
                                            <span className="text-[10px] font-black uppercase text-neutral-300 mb-3 block">{s.songType}</span>
                                            <h3 className="text-xl font-black text-neutral-800 mb-3 leading-tight">{s.title}</h3>
                                            <p className="text-xs text-neutral-400 line-clamp-3 leading-relaxed">{s.lyrics}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && currentSong && (
                            <div className="bg-white rounded-[3rem] shadow-sm border p-6 md:p-12">
                                <button onClick={() => setView('list')} className="mb-10 text-neutral-400 font-bold hover:text-[#F7784A] flex items-center gap-2"><Icon name="arrow-left"/> RETOUR</button>
                                <div className="flex flex-col md:flex-row justify-between items-start mb-12 border-b-4 border-orange-50 pb-8 gap-6">
                                    <div>
                                        <span className="text-xs font-black text-[#F7784A] uppercase bg-orange-50 px-3 py-1 rounded-lg">{currentSong.songType}</span>
                                        <h2 className="text-4xl md:text-6xl font-black text-neutral-900 mt-4 tracking-tighter">{currentSong.title}</h2>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => { setFormData(currentSong); setView('form'); }} className="p-4 bg-blue-50 text-blue-600 rounded-[1.5rem] shadow-sm"><Icon name="edit-2"/></button>
                                        <button onClick={() => { if(confirm("Supprimer ?")) db.collection('songs').doc(currentSong.id).delete().then(()=>setView('list')); }} className="p-4 bg-red-50 text-red-600 rounded-[1.5rem] shadow-sm"><Icon name="trash-2"/></button>
                                    </div>
                                </div>
                                <div className="grid lg:grid-cols-3 gap-12">
                                    <div className="lg:col-span-2 space-y-12">
                                        {currentSong.audioData && <div className="bg-orange-50 p-6 rounded-[2rem]"><h4 className="font-bold text-[#9F512A] mb-4 text-xs uppercase flex items-center gap-2"><Icon name="mic"/> Écouter la mélodie</h4><audio src={currentSong.audioData} controls className="w-full" /></div>}
                                        <div className="grid sm:grid-cols-2 gap-10">
                                            <section><h4 className="font-black text-[#FCB13D] mb-6 uppercase text-xs border-b border-orange-50 pb-2">Portugais</h4><div className="whitespace-pre-wrap text-[15px] leading-relaxed font-semibold">{currentSong.lyrics}</div></section>
                                            <section><h4 className="font-black text-[#F7784A] mb-6 uppercase text-xs border-b border-orange-50 pb-2">Français</h4><div className="whitespace-pre-wrap text-[15px] leading-relaxed italic text-neutral-500 border-l-2 pl-6">{currentSong.translation}</div></section>
                                        </div>
                                    </div>
                                    <div className="space-y-8">
                                        <div className="p-8 bg-neutral-50/50 rounded-[2rem] border border-neutral-100"><h4 className="text-[10px] font-black text-neutral-400 uppercase mb-4 tracking-widest">Rythme</h4><p className="font-black text-neutral-800 text-lg">{currentSong.rhythm || "Libre"}</p></div>
                                        <div className="p-8 bg-neutral-50/50 rounded-[2rem] border border-neutral-100"><h4 className="text-[10px] font-black text-neutral-400 uppercase mb-4 tracking-widest">Histoire</h4><p className="text-sm text-neutral-600 leading-relaxed italic">{currentSong.note || "Aucune note."}</p></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'form' && (
                            <div className="max-w-4xl mx-auto bg-white rounded-[3rem] p-8 md:p-12 shadow-2xl">
                                <h2 className="text-3xl font-black text-[#F7784A] mb-12 uppercase tracking-tighter">{formData.id ? 'Modifier' : 'Nouveau Chant'}</h2>
                                <form onSubmit={handleSave} className="space-y-8">
                                    <div className="grid sm:grid-cols-3 gap-6">
                                        <input type="text" required value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} placeholder="Titre ou fragment..." className="sm:col-span-2 p-5 bg-neutral-50 rounded-2xl outline-none focus:ring-4 focus:ring-[#FCB13D]/20 font-black text-xl" />
                                        <select value={formData.songType} onChange={(e) => setFormData({...formData, songType: e.target.value})} className="p-5 bg-neutral-50 rounded-2xl outline-none font-extrabold appearance-none cursor-pointer">
                                            <option value="">Type</option>
                                            {SONG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white flex flex-col md:flex-row items-center justify-between gap-6 shadow-xl relative overflow-hidden">
                                        <div className="relative z-10"><h4 className="font-black text-xl mb-1 uppercase tracking-tighter">Assistant IA Senzala</h4><p className="text-xs opacity-80">L'IA complète les paroles et la traduction automatiquement.</p></div>
                                        <button type="button" onClick={handleGenerateAI} disabled={aiLoading} className="relative z-10 bg-white text-indigo-700 px-10 py-4 rounded-[1.5rem] font-black text-xs shadow-xl disabled:opacity-50">{aiLoading ? "ANALYSE..." : "RECONNAISSANCE AUTO"}</button>
                                    </div>
                                    <div className="bg-orange-50 p-8 rounded-[2.5rem] border-2 border-orange-100 flex flex-col md:flex-row items-center gap-8 shadow-inner">
                                        <div className="flex-1 text-center md:text-left"><h4 className="text-xs font-black mb-2 uppercase text-[#9F512A]">Dictaphone</h4><p className="text-xs text-orange-800/50 italic font-bold">Enregistrez l'air du chant pour votre répertoire personnel.</p></div>
                                        {formData.audioData ? <div className="flex gap-4 items-center bg-white p-4 rounded-2xl shadow-xl"><audio src={formData.audioData} controls className="flex-1 w-40 h-8" /><button type="button" onClick={() => setFormData({...formData, audioData: ''})} className="text-red-500 font-black">X</button></div> : 
                                        <button type="button" onClick={isRecording ? () => mediaRecorderRef.current.stop() || setIsRecording(false) : startRecording} className={`w-full md:w-64 px-8 py-4 rounded-[1.5rem] font-black text-xs text-white shadow-xl ${isRecording ? 'bg-black animate-pulse' : 'bg-red-500'}`}>{isRecording ? "STOPPER" : "ENREGISTRER L'AIR"}</button>}
                                    </div>
                                    <div className="grid sm:grid-cols-2 gap-8">
                                        <textarea rows={10} placeholder="Paroles (PT)..." value={formData.lyrics} onChange={(e) => setFormData({...formData, lyrics: e.target.value})} className="w-full p-8 bg-neutral-50 rounded-[2rem] outline-none font-medium leading-relaxed" />
                                        <textarea rows={10} placeholder="Traduction (FR)..." value={formData.translation} onChange={(e) => setFormData({...formData, translation: e.target.value})} className="w-full p-8 bg-blue-50/20 rounded-[2rem] outline-none italic font-medium leading-relaxed" />
                                    </div>
                                    <div className="flex flex-col md:flex-row justify-end gap-4 pt-10 border-t">
                                        <button type="button" onClick={() => setView('list')} className="px-8 py-4 font-black text-neutral-400 uppercase text-xs">Annuler</button>
                                        <button type="submit" className="bg-gradient-to-r from-[#FCB13D] to-[#F7784A] text-white px-12 py-5 rounded-[2rem] font-black shadow-2xl uppercase text-sm tracking-widest flex items-center justify-center gap-3"><Icon name="save"/> Enregistrer dans l'Acervo</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>
                    <footer className="mt-20 py-10 text-center border-t border-neutral-50">
                        <p className="text-[10px] font-black text-neutral-200 uppercase tracking-[0.6em]">Senzala Villefranche - Projet Acervo Digital 2026</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
